name: Actualizar agenda automáticamente

on:
  schedule:
    # 0hs, 6hs, 12hs y 18hs hora Argentina (UTC-3 = UTC+3)
    - cron: "0 3,9,15,21 * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 📥 Descargar repositorio
        uses: actions/checkout@v4

      - name: 🐍 Instalar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Instalar dependencias Python
        run: pip install requests beautifulsoup4 playwright

      - name: 🎭 Instalar Playwright (Chromium)
        run: playwright install chromium --with-deps

      - name: 🎸 Ejecutar scraper
        run: python scraper.py

      - name: 💾 Guardar shows.json en el repositorio
        run: |
          git config user.name  "natu-bot"
          git config user.email "natu-bot@agendanatu.ar"
          git add shows.json
          git diff --staged --quiet || \
            git commit -m "🎭 Agenda actualizada — $(date '+%d/%m/%Y %H:%M')"
          git push
